{{- if include "logsnare.secretsEnabled" . }}
# Logsnare - Database Credentials Secret
# SECURITY_NOTE: Generated from values.yaml connection settings
# In production, consider using external secret management
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "logsnare.secretName" . }}
  namespace: {{ include "logsnare.namespace" . }}
  labels:
    {{- include "logsnare.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
type: Opaque
data:
  {{- if .Values.connections.mongodb.enabled }}
  # MongoDB Credentials
  {{- if .Values.connections.mongodb.username }}
  mongodb-username: {{ .Values.connections.mongodb.username | b64enc | quote }}
  {{- end }}
  {{- if .Values.connections.mongodb.password }}
  mongodb-password: {{ .Values.connections.mongodb.password | b64enc | quote }}
  {{- end }}
  {{- end }}
  
  {{- if .Values.connections.mysql.enabled }}
  # MySQL Credentials
  {{- if .Values.connections.mysql.username }}
  mysql-username: {{ .Values.connections.mysql.username | b64enc | quote }}
  {{- end }}
  {{- if .Values.connections.mysql.password }}
  mysql-password: {{ .Values.connections.mysql.password | b64enc | quote }}
  {{- end }}
  {{- end }}
  
  {{- if .Values.connections.postgresql.enabled }}
  # PostgreSQL Credentials
  {{- if .Values.connections.postgresql.username }}
  postgresql-username: {{ .Values.connections.postgresql.username | b64enc | quote }}
  {{- end }}
  {{- if .Values.connections.postgresql.password }}
  postgresql-password: {{ .Values.connections.postgresql.password | b64enc | quote }}
  {{- end }}
  {{- end }}
  
  {{- if .Values.connections.influxdb.enabled }}
  # InfluxDB Credentials
  {{- if .Values.connections.influxdb.token }}
  influxdb-token: {{ .Values.connections.influxdb.token | b64enc | quote }}
  {{- end }}
  {{- end }}
  
  {{- if .Values.connections.elasticsearch.enabled }}
  # Elasticsearch Credentials
  {{- if .Values.connections.elasticsearch.username }}
  elasticsearch-username: {{ .Values.connections.elasticsearch.username | b64enc | quote }}
  {{- end }}
  {{- if .Values.connections.elasticsearch.password }}
  elasticsearch-password: {{ .Values.connections.elasticsearch.password | b64enc | quote }}
  {{- end }}
  {{- if .Values.connections.elasticsearch.apiKey }}
  elasticsearch-api-key: {{ .Values.connections.elasticsearch.apiKey | b64enc | quote }}
  {{- end }}
  {{- end }}
  
  {{- if .Values.connections.azure.enabled }}
  # Azure Log Analytics Credentials
  {{- if .Values.connections.azure.workspaceId }}
  azure-workspace-id: {{ .Values.connections.azure.workspaceId | b64enc | quote }}
  {{- end }}
  {{- if .Values.connections.azure.sharedKey }}
  azure-shared-key: {{ .Values.connections.azure.sharedKey | b64enc | quote }}
  {{- end }}
  {{- end }}
  
  {{- if .Values.connections.gcp.enabled }}
  # GCP Cloud Logging Credentials
  {{- if .Values.connections.gcp.serviceAccountKey }}
  # Service Account JSON Key (for non-Workload Identity environments)
  gcp-service-account-key: {{ .Values.connections.gcp.serviceAccountKey | b64enc | quote }}
  {{- end }}
  {{- end }}
  
  {{- if .Values.connections.aws.enabled }}
  # AWS CloudWatch Credentials
  {{- if .Values.connections.aws.accessKeyId }}
  aws-access-key-id: {{ .Values.connections.aws.accessKeyId | b64enc | quote }}
  {{- end }}
  {{- if .Values.connections.aws.secretAccessKey }}
  aws-secret-access-key: {{ .Values.connections.aws.secretAccessKey | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
